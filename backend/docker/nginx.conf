# Reverse-proxy nginx pour TontineSecure — sert l'API Laravel via php-fpm (app:9000).
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 8M; # tolérance upload KYC (< 5 Mo côté applicatif)

    # Résolveur DNS interne de Docker : permet de re-résoudre « app » à chaque
    # requête. Sans ça, une IP mise en cache au démarrage devient obsolète quand
    # le conteneur app est recréé (rebuild partiel) -> 502 jusqu'au restart nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
