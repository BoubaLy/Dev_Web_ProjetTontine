# =====================================================================
# TontineSecure — orchestration de production (self-hosting)
# nginx  → php-fpm (app)  → mysql, avec workers queue & scheduler.
# Prérequis : backend/.env (copié depuis backend/.env.production.example).
# Démarrage : docker compose up -d --build
# =====================================================================

services:
  app:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      RUN_MIGRATIONS: "true" # seul ce conteneur migre + cache la config
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  queue:
    build:
      context: ./backend
    command: php artisan queue:work --tries=3 --sleep=3 --max-time=3600
    env_file:
      - ./backend/.env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
    command: php artisan schedule:work
    env_file:
      - ./backend/.env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tontinesecure}
      MYSQL_USER: ${DB_USERNAME:-tontinesecure}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-change-me-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app-storage:
  mysql-data:
